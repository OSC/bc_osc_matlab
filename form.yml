---
cluster:
  - "pitzer"
  - "cardinal"
form:
  - auto_modules_matlab
  - auto_accounts
  - bc_num_hours
  - global_node_type
  - bc_num_slots
  - num_cores
  - gpus
  - bc_vnc_resolution
  - bc_email_on_started
attributes:
  auto_modules_matlab:
    default: false
  bc_vnc_resolution:
    required: true
  num_cores:
    widget: number_field
    label: "Number of cores"
  gpus:
    widget: number_field
    label: "GPUs"
  global_node_type:
    help: |
      The node type options change based on the selected cluster. To find more information about each node type for a specific cluster, please visit the batch limit rules pages for [Cardinal], [Ascend] and [Pitzer].

      [Cardinal]: https://www.osc.edu/resources/technical_support/supercomputers/cardinal/batch_limit_rules
      [Ascend]:  https://www.osc.edu/resources/technical_support/supercomputers/ascend/batch_limit_rules
      [Pitzer]: https://www.osc.edu/resources/technical_support/supercomputers/pitzer/batch_limit_rules
